<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi sitio en AWS S3</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      text-align: center;
    }
    header {
      padding: 60px 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
    }
    .card {
      background: white;
      color: #111827;
      margin: 30px auto;
      max-width: 600px;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <header>
<h1>Hola, soy Carlos - Version Manual 3</h1>
<p>Segunda actualización reflejada en AWS Console.</p>
  </header>

  <section class="card">
    <h2>Actividad 1 - DevOps</h2>
    <p>
      Este proyecto fue versionado con Git y GitHub, y será desplegado
      en Amazon S3 usando AWS CLI y AWS Console.
    </p>
    <a class="btn" href="#">Ver más</a>
  </section>

  <footer>
    <p>Desarrollado por Carlos - 2026</p>
  </footer>
</body>
</html>
